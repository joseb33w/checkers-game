<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Checkers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #1a1410;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #f3eada;
      padding: 12px;
      min-height: 100vh;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #2a1d15;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .title {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .title .crown { color: #e63946; margin-right: 4px; }

    .modes {
      display: flex;
      gap: 4px;
      padding: 3px;
      background: rgba(0,0,0,0.4);
      border-radius: 999px;
    }
    .mode-btn {
      border: 0;
      background: transparent;
      color: #b3a890;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
    }
    .mode-btn.active {
      background: #e63946;
      color: white;
    }

    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .player.active { border-color: #ffd166; }
    .chip {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chip.red { background: radial-gradient(circle at 35% 30%, #ff6b7a, #e63946 50%, #8b1a26); }
    .chip.black { background: radial-gradient(circle at 35% 30%, #5a5a5a, #1a1a1a 50%, #000); }
    .player-info { flex: 1; min-width: 0; }
    .player-info .role {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #b3a890;
    }
    .player-info .name {
      font-size: 0.95rem;
      font-weight: 700;
    }
    .count {
      font-size: 1.1rem;
      font-weight: 800;
    }

    .turn {
      text-align: center;
      padding: 9px;
      border-radius: 10px;
      background: rgba(255,209,102,0.15);
      border: 1px solid rgba(255,209,102,0.3);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .board-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .board {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 4px solid #2a1810;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .cell.light { background: #f4d8a1; }
    .cell.dark { background: #7a4a2b; cursor: pointer; }
    .cell.highlight::after {
      content: '';
      position: absolute;
      width: 36%;
      height: 36%;
      border-radius: 50%;
      background: rgba(255,209,102,0.7);
    }
    .cell.capture::after {
      content: '';
      position: absolute;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      border: 4px solid rgba(95,241,210,0.8);
      background: rgba(95,241,210,0.15);
    }
    .cell.selected {
      box-shadow: inset 0 0 0 4px #ffd166;
    }

    .piece {
      width: 78%;
      height: 78%;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .piece.red {
      background: radial-gradient(circle at 35% 30%, #ff6b7a, #e63946 50%, #8b1a26);
      box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 -3px 5px rgba(0,0,0,0.3);
    }
    .piece.black {
      background: radial-gradient(circle at 35% 30%, #5a5a5a, #1a1a1a 50%, #000);
      box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.6);
    }
    .piece.movable {
      box-shadow: 0 0 0 3px #ffd166, 0 4px 8px rgba(0,0,0,0.4);
    }
    .piece.king::after {
      content: '\265A';
      color: gold;
      font-size: 1.4em;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }

    .status {
      text-align: center;
      color: #b3a890;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 4px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
    }
    .btn.primary {
      background: #e63946;
      color: white;
    }
    .btn.ghost {
      background: rgba(255,255,255,0.08);
      color: #f3eada;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn:active { transform: scale(0.97); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #2a1d15;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px 22px;
      text-align: center;
      max-width: 320px;
      width: 100%;
    }
    .modal .icon { font-size: 3rem; margin-bottom: 8px; }
    .modal h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .modal p { color: #b3a890; margin-bottom: 18px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div class="title"><span class="crown">♚</span>Checkers</div>
        <div class="modes">
          <button class="mode-btn active" data-mode="pvc" type="button">vs Computer</button>
          <button class="mode-btn" data-mode="pvp" type="button">vs Friend</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="players">
        <div class="player active" id="playerRed">
          <div class="chip red"></div>
          <div class="player-info">
            <div class="role">Red</div>
            <div class="name" id="redLabel">You</div>
          </div>
          <div class="count" id="redScore">12</div>
        </div>
        <div class="player" id="playerBlack">
          <div class="chip black"></div>
          <div class="player-info">
            <div class="role">Black</div>
            <div class="name" id="blackLabel">CPU</div>
          </div>
          <div class="count" id="blackScore">12</div>
        </div>
      </div>
    </div>

    <div class="turn" id="turnPill">Your turn</div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="status" id="status">Pick a red piece to move.</div>
    </div>

    <div class="controls">
      <button class="btn primary" id="newGameBtn" type="button">New game</button>
      <button class="btn ghost" id="undoBtn" type="button">Undo</button>
    </div>
  </div>

  <div class="overlay" id="winOverlay">
    <div class="modal">
      <div class="icon">🏆</div>
      <h2 id="winTitle">Red wins!</h2>
      <p id="winMessage">Great game.</p>
      <button class="btn primary" id="playAgainBtn" type="button">Play again</button>
    </div>
  </div>

  <script>
  (function() {
    'use strict';
    var RED = 'red', BLACK = 'black', SIZE = 8;
    var state = {
      board: [], turn: RED, mode: 'pvc',
      selected: null, legalMoves: [], mustCaptureFrom: null,
      history: [], gameOver: false, aiThinking: false
    };
    var els = {
      board: document.getElementById('board'),
      redLabel: document.getElementById('redLabel'),
      blackLabel: document.getElementById('blackLabel'),
      redScore: document.getElementById('redScore'),
      blackScore: document.getElementById('blackScore'),
      playerRed: document.getElementById('playerRed'),
      playerBlack: document.getElementById('playerBlack'),
      turnPill: document.getElementById('turnPill'),
      status: document.getElementById('status'),
      newGameBtn: document.getElementById('newGameBtn'),
      undoBtn: document.getElementById('undoBtn'),
      modeBtns: document.querySelectorAll('.mode-btn'),
      winOverlay: document.getElementById('winOverlay'),
      winTitle: document.getElementById('winTitle'),
      winMessage: document.getElementById('winMessage'),
      playAgainBtn: document.getElementById('playAgainBtn')
    };

    function init() {
      try {
        buildBoard();
        els.newGameBtn.addEventListener('click', newGame);
        els.undoBtn.addEventListener('click', undo);
        els.playAgainBtn.addEventListener('click', function() {
          els.winOverlay.classList.remove('show');
          newGame();
        });
        els.modeBtns.forEach(function(btn) {
          btn.addEventListener('click', function() {
            els.modeBtns.forEach(function(b) {
              b.classList.toggle('active', b === btn);
            });
            state.mode = btn.dataset.mode;
            newGame();
          });
        });
        newGame();
      } catch (e) {
        console.error('Init error:', e.message, e.stack);
        if (els.status) els.status.textContent = 'Error: ' + e.message;
      }
    }

    function buildBoard() {
      els.board.innerHTML = '';
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          var cell = document.createElement('div');
          var isDark = (r + c) % 2 === 1;
          cell.className = 'cell ' + (isDark ? 'dark' : 'light');
          cell.dataset.row = r;
          cell.dataset.col = c;
          (function(rr, cc) {
            cell.addEventListener('click', function() { onCellClick(rr, cc); });
          })(r, c);
          els.board.appendChild(cell);
        }
      }
    }

    function newGame() {
      state.board = createInitialBoard();
      state.turn = RED;
      state.selected = null;
      state.legalMoves = [];
      state.mustCaptureFrom = null;
      state.history = [];
      state.gameOver = false;
      state.aiThinking = false;
      els.redLabel.textContent = state.mode === 'pvc' ? 'You' : 'P1';
      els.blackLabel.textContent = state.mode === 'pvc' ? 'CPU' : 'P2';
      render();
    }

    function createInitialBoard() {
      var board = [];
      for (var r = 0; r < SIZE; r++) {
        var row = [];
        for (var c = 0; c < SIZE; c++) {
          var isDark = (r + c) % 2 === 1;
          if (isDark && r < 3) row.push({ color: BLACK, king: false });
          else if (isDark && r > 4) row.push({ color: RED, king: false });
          else row.push(null);
        }
        board.push(row);
      }
      return board;
    }

    function snapshot() {
      return {
        board: state.board.map(function(row) {
          return row.map(function(p) { return p ? { color: p.color, king: p.king } : null; });
        }),
        turn: state.turn,
        mustCaptureFrom: state.mustCaptureFrom ? { r: state.mustCaptureFrom.r, c: state.mustCaptureFrom.c } : null
      };
    }

    function restore(s) {
      state.board = s.board.map(function(row) {
        return row.map(function(p) { return p ? { color: p.color, king: p.king } : null; });
      });
      state.turn = s.turn;
      state.mustCaptureFrom = s.mustCaptureFrom ? { r: s.mustCaptureFrom.r, c: s.mustCaptureFrom.c } : null;
      state.selected = null;
      state.legalMoves = [];
      state.gameOver = false;
    }

    function undo() {
      if (state.aiThinking || !state.history.length) return;
      var snap = state.history.pop();
      if (state.mode === 'pvc' && state.history.length && snap.turn === BLACK) {
        snap = state.history.pop();
      }
      restore(snap);
      render();
    }

    function getPieceMoves(r, c, capturesOnly) {
      var piece = state.board[r][c];
      if (!piece) return [];
      var moves = [];
      var dirs;
      if (piece.king) dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
      else if (piece.color === RED) dirs = [[-1,-1],[-1,1]];
      else dirs = [[1,-1],[1,1]];

      for (var i = 0; i < dirs.length; i++) {
        var dr = dirs[i][0], dc = dirs[i][1];
        var mr = r + dr, mc = c + dc;
        var lr = r + dr * 2, lc = c + dc * 2;
        if (lr < 0 || lr >= SIZE || lc < 0 || lc >= SIZE) continue;
        var middle = state.board[mr] && state.board[mr][mc];
        var landing = state.board[lr] && state.board[lr][lc];
        if (middle && middle.color !== piece.color && !landing) {
          moves.push({ from:{r:r,c:c}, to:{r:lr,c:lc}, capture:{r:mr,c:mc} });
        }
      }
      if (capturesOnly) return moves;
      if (moves.length) return moves;

      for (var j = 0; j < dirs.length; j++) {
        var dr2 = dirs[j][0], dc2 = dirs[j][1];
        var nr = r + dr2, nc = c + dc2;
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
        if (!state.board[nr][nc]) {
          moves.push({ from:{r:r,c:c}, to:{r:nr,c:nc}, capture:null });
        }
      }
      return moves;
    }

    function getAllMoves(color) {
      var caps = [], simples = [];
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          var p = state.board[r][c];
          if (!p || p.color !== color) continue;
          var ms = getPieceMoves(r, c);
          for (var i = 0; i < ms.length; i++) {
            if (ms[i].capture) caps.push(ms[i]);
            else simples.push(ms[i]);
          }
        }
      }
      return caps.length ? caps : simples;
    }

    function getLegalMovesForSelection(r, c) {
      if (state.mustCaptureFrom) {
        if (state.mustCaptureFrom.r !== r || state.mustCaptureFrom.c !== c) return [];
        return getPieceMoves(r, c, true);
      }
      var all = getAllMoves(state.turn);
      var hasCap = all.some(function(m){ return m.capture; });
      var moves = getPieceMoves(r, c);
      if (hasCap) return moves.filter(function(m){ return m.capture; });
      return moves;
    }

    function onCellClick(r, c) {
      if (state.gameOver || state.aiThinking) return;
      if (state.mode === 'pvc' && state.turn === BLACK) return;
      var piece = state.board[r][c];
      if (piece && piece.color === state.turn) {
        if (state.mustCaptureFrom && (state.mustCaptureFrom.r !== r || state.mustCaptureFrom.c !== c)) return;
        state.selected = { r: r, c: c };
        state.legalMoves = getLegalMovesForSelection(r, c);
        render();
        return;
      }
      if (state.selected) {
        var move = state.legalMoves.find(function(m) { return m.to.r === r && m.to.c === c; });
        if (move) applyMove(move);
      }
    }

    function applyMove(move) {
      state.history.push(snapshot());
      var piece = state.board[move.from.r][move.from.c];
      state.board[move.to.r][move.to.c] = piece;
      state.board[move.from.r][move.from.c] = null;
      if (move.capture) state.board[move.capture.r][move.capture.c] = null;
      var justKinged = false;
      if (!piece.king) {
        if (piece.color === RED && move.to.r === 0) { piece.king = true; justKinged = true; }
        if (piece.color === BLACK && move.to.r === SIZE - 1) { piece.king = true; justKinged = true; }
      }
      if (move.capture && !justKinged) {
        var more = getPieceMoves(move.to.r, move.to.c, true);
        if (more.length) {
          state.mustCaptureFrom = { r: move.to.r, c: move.to.c };
          state.selected = { r: move.to.r, c: move.to.c };
          state.legalMoves = more;
          render();
          return;
        }
      }
      state.mustCaptureFrom = null;
      state.selected = null;
      state.legalMoves = [];
      state.turn = state.turn === RED ? BLACK : RED;
      render();
      if (checkGameOver()) return;
      if (state.mode === 'pvc' && state.turn === BLACK) {
        state.aiThinking = true;
        render();
        setTimeout(aiTurn, 500);
      }
    }

    function aiTurn() {
      try {
        while (state.turn === BLACK && !state.gameOver) {
          var move = pickBestMove(BLACK);
          if (!move) break;
          state.history.push(snapshot());
          var piece = state.board[move.from.r][move.from.c];
          state.board[move.to.r][move.to.c] = piece;
          state.board[move.from.r][move.from.c] = null;
          if (move.capture) state.board[move.capture.r][move.capture.c] = null;
          var justKinged = false;
          if (!piece.king && move.to.r === SIZE - 1) { piece.king = true; justKinged = true; }
          if (move.capture && !justKinged) {
            var more = getPieceMoves(move.to.r, move.to.c, true);
            if (more.length) {
              state.mustCaptureFrom = { r: move.to.r, c: move.to.c };
              continue;
            }
          }
          state.mustCaptureFrom = null;
          state.turn = RED;
        }
        state.aiThinking = false;
        render();
        checkGameOver();
      } catch (e) {
        console.error('AI error:', e.message, e.stack);
        state.aiThinking = false;
        render();
      }
    }

    function pickBestMove(color) {
      var moves;
      if (state.mustCaptureFrom) {
        moves = getPieceMoves(state.mustCaptureFrom.r, state.mustCaptureFrom.c, true);
      } else {
        moves = getAllMoves(color);
      }
      if (!moves.length) return null;
      var bestScore = -Infinity, best = [];
      for (var i = 0; i < moves.length; i++) {
        var m = moves[i];
        var snap = snapshot();
        var p = state.board[m.from.r][m.from.c];
        state.board[m.to.r][m.to.c] = p;
        state.board[m.from.r][m.from.c] = null;
        if (m.capture) state.board[m.capture.r][m.capture.c] = null;
        var wasKing = p.king;
        if (!p.king && color === BLACK && m.to.r === SIZE - 1) p.king = true;
        if (!p.king && color === RED && m.to.r === 0) p.king = true;
        var score = evaluate(color);
        var oppMoves = getAllMoves(color === BLACK ? RED : BLACK);
        var worst = 0;
        for (var k = 0; k < oppMoves.length; k++) {
          if (oppMoves[k].capture) worst = 3;
        }
        score -= worst;
        p.king = wasKing;
        restore(snap);
        if (score > bestScore) { bestScore = score; best = [m]; }
        else if (score === bestScore) { best.push(m); }
      }
      return best[Math.floor(Math.random() * best.length)];
    }

    function evaluate(color) {
      var score = 0;
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          var p = state.board[r][c];
          if (!p) continue;
          var v = p.king ? 5 : 3;
          var adv = p.color === BLACK ? r : SIZE - 1 - r;
          var t = v + adv * 0.1;
          score += p.color === color ? t : -t;
        }
      }
      return score;
    }

    function checkGameOver() {
      var moves = getAllMoves(state.turn);
      if (!moves.length) {
        state.gameOver = true;
        showWin(state.turn === RED ? BLACK : RED);
        return true;
      }
      var counts = countPieces();
      if (counts.red === 0 || counts.black === 0) {
        state.gameOver = true;
        showWin(counts.red === 0 ? BLACK : RED);
        return true;
      }
      return false;
    }

    function countPieces() {
      var red = 0, black = 0;
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          var p = state.board[r][c];
          if (!p) continue;
          if (p.color === RED) red++; else black++;
        }
      }
      return { red: red, black: black };
    }

    function showWin(winner) {
      var counts = countPieces();
      var title, msg;
      if (state.mode === 'pvc') {
        title = winner === RED ? 'You win! 🎉' : 'Computer wins';
        msg = winner === RED ? 'Nicely played.' : 'Try again — you got this.';
      } else {
        title = winner === RED ? 'Red wins! 🎉' : 'Black wins! 🎉';
        msg = 'Final pieces: Red ' + counts.red + ', Black ' + counts.black;
      }
      els.winTitle.textContent = title;
      els.winMessage.textContent = msg;
      els.winOverlay.classList.add('show');
    }

    function render() {
      var cells = els.board.children;
      var counts = countPieces();
      els.redScore.textContent = counts.red;
      els.blackScore.textContent = counts.black;
      els.playerRed.classList.toggle('active', state.turn === RED && !state.gameOver);
      els.playerBlack.classList.toggle('active', state.turn === BLACK && !state.gameOver);

      var turnText;
      if (state.gameOver) turnText = 'Game over';
      else if (state.mode === 'pvc') turnText = state.turn === RED ? 'Your turn' : 'Computer thinking...';
      else turnText = state.turn === RED ? "Red's turn" : "Black's turn";
      els.turnPill.textContent = turnText;

      var statusText;
      if (state.gameOver) statusText = 'Game over — start a new game.';
      else if (state.aiThinking) statusText = 'Computer is making its move...';
      else if (state.mustCaptureFrom) statusText = 'Chain capture — keep jumping!';
      else if (state.selected) statusText = state.legalMoves.length ? 'Pick a highlighted square.' : 'No moves for this piece.';
      else {
        var all = getAllMoves(state.turn);
        var hasCap = all.some(function(m){ return m.capture; });
        statusText = hasCap ? 'Capture available — must jump!' : 'Select a piece to move.';
      }
      els.status.textContent = statusText;

      var movableSet = {};
      var allMoves = state.gameOver ? [] : getAllMoves(state.turn);
      if (state.mustCaptureFrom) {
        movableSet[state.mustCaptureFrom.r + ',' + state.mustCaptureFrom.c] = true;
      } else if (!state.aiThinking && (state.mode === 'pvp' || state.turn === RED)) {
        for (var i = 0; i < allMoves.length; i++) {
          movableSet[allMoves[i].from.r + ',' + allMoves[i].from.c] = true;
        }
      }

      for (var k = 0; k < cells.length; k++) {
        var cell = cells[k];
        var rr = Number(cell.dataset.row);
        var cc = Number(cell.dataset.col);
        cell.classList.remove('selected', 'highlight', 'capture');
        cell.innerHTML = '';
        var pc = state.board[rr][cc];
        if (pc) {
          var div = document.createElement('div');
          div.className = 'piece ' + pc.color + (pc.king ? ' king' : '');
          if (movableSet[rr + ',' + cc]) div.classList.add('movable');
          cell.appendChild(div);
        }
        if (state.selected && state.selected.r === rr && state.selected.c === cc) {
          cell.classList.add('selected');
        }
        var move = state.legalMoves.find(function(m) { return m.to.r === rr && m.to.c === cc; });
        if (move) cell.classList.add(move.capture ? 'capture' : 'highlight');
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
